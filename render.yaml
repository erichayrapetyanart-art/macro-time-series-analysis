services:
  - type: web
    name: macro-var-varx-dashboard
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run dashboard_app.py --server.address=0.0.0.0 --server.port=$PORT --server.headless=true
    autoDeployTrigger: commit
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PYTHONUNBUFFERED
        value: "1"
